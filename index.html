
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 anos de nós</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
color:white;
text-align:center;
overflow:hidden;

background: radial-gradient(circle at top,#1c1c2e,#0f0f0f);
}

.container{
padding:30px 20px;
max-width:520px;
margin:auto;
position:relative;
z-index:2;
}

h1{
font-size:34px;
margin-bottom:10px;
}

#contador{
font-size:16px;
margin-bottom:25px;
opacity:.9;
}

#texto{
font-size:18px;
line-height:1.6;
min-height:160px;
margin-bottom:25px;
}

button{
background:#ff4d6d;
color:white;
border:none;
padding:16px 30px;
font-size:18px;
border-radius:30px;
cursor:pointer;
width:80%;
max-width:280px;
box-shadow:0 10px 25px rgba(0,0,0,.5);
}

.galeria{
display:none;
margin-top:20px;
}

.polaroid{
background:white;
padding:8px;
width:110px;
margin:10px;
display:inline-block;
transform:rotate(-3deg);
box-shadow:0 10px 25px rgba(0,0,0,.6);
border-radius:6px;
animation:flutuar 5s ease-in-out infinite;
}

.polaroid img{
width:100%;
border-radius:4px;
}

@keyframes flutuar{
0%{transform:translateY(0) rotate(-3deg)}
50%{transform:translateY(-10px) rotate(3deg)}
100%{transform:translateY(0) rotate(-3deg)}
}

.coracao{
position:fixed;
color:#ff4d6d;
animation:cair 6s linear infinite;
}

@keyframes cair{
0%{transform:translateY(-10vh);opacity:1}
100%{transform:translateY(110vh);opacity:0}
}

.estrela{
position:fixed;
color:white;
font-size:10px;
animation:piscar 2s infinite alternate;
}

@keyframes piscar{
from{opacity:.2}
to{opacity:1}
}

</style>
</head>

<body>

<div class="container">

<h1>7 anos de nós ❤️</h1>

<div id="contador"></div>

<div id="texto"></div>

<button onclick="iniciar()">Começar nossa história</button>

<div class="galeria" id="galeria">

<div class="polaroid"><img src="foto1.jpg"></div>
<div class="polaroid"><img src="foto2.jpg"></div>
<div class="polaroid"><img src="foto3.jpg"></div>

</div>

</div>

<audio id="musica" loop>
<source src="audio.mp3" type="audio/mpeg">
</audio>

<script>

const inicio = new Date("2019-03-16")

function atualizarContador(){

const agora = new Date()

let anos = agora.getFullYear() - inicio.getFullYear()
let meses = agora.getMonth() - inicio.getMonth()
let dias = agora.getDate() - inicio.getDate()

if(dias < 0){meses--;dias += 30}
if(meses < 0){anos--;meses += 12}

document.getElementById("contador").innerHTML =
"Estamos juntos há <b>"+anos+" anos, "+meses+" meses e "+dias+" dias</b> ❤️"

}

setInterval(atualizarContador,1000)
atualizarContador()

const texto = `
Sete anos parecem apenas um número…

até lembrar de tudo que cabe dentro dele.

Momentos simples viraram memórias.
Conversas viraram planos.
E planos viraram nossa história.

Entre risadas, desafios e sonhos,
construímos algo raro.

Algo verdadeiro.

Feliz 7 anos de nós ❤️
`

let i = 0

function escrever(){

if(i < texto.length){

document.getElementById("texto").innerHTML += texto.charAt(i)

i++

setTimeout(escrever,35)

}else{

document.getElementById("galeria").style.display="block"

}

}

function iniciar(){

document.querySelector("button").style.display="none"

document.getElementById("musica").play()

escrever()

}

function coracoes(){

const coracao = document.createElement("div")

coracao.classList.add("coracao")

coracao.innerHTML = "❤"

coracao.style.left = Math.random()*100+"vw"

coracao.style.fontSize = Math.random()*20+12+"px"

document.body.appendChild(coracao)

setTimeout(()=>{coracao.remove()},6000)

}

setInterval(coracoes,350)


function estrelas(){

const estrela = document.createElement("div")

estrela.classList.add("estrela")

estrela.innerHTML = "✦"

estrela.style.left = Math.random()*100+"vw"
estrela.style.top = Math.random()*100+"vh"

document.body.appendChild(estrela)

setTimeout(()=>{estrela.remove()},2000)

}

setInterval(estrelas,200)

</script>

</body>
</html>

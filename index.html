
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 anos de nós</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
color:white;
text-align:center;
overflow:hidden;
background:#05050a;
}

/* canvas estrelas */
#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* container */
.container{
position:relative;
z-index:2;
padding:30px 20px;
max-width:520px;
margin:auto;
}

/* titulo */
h1{
font-size:34px;
margin-bottom:8px;
letter-spacing:1px;
}

/* contador */
#contador{
font-size:16px;
opacity:.9;
margin-bottom:20px;
}

/* texto */
#texto{
font-size:18px;
line-height:1.6;
min-height:150px;
margin-bottom:25px;
}

/* botão principal */
button{
background:linear-gradient(45deg,#ff4d6d,#ff758f);
border:none;
color:white;
padding:16px 30px;
font-size:18px;
border-radius:40px;
cursor:pointer;
box-shadow:0 12px 25px rgba(0,0,0,.5);
width:85%;
max-width:280px;
}

/* galeria */
.galeria{
display:none;
margin-top:20px;
}

/* fotos polaroid */
.polaroid{
background:white;
padding:8px;
width:120px;
display:inline-block;
margin:10px;
border-radius:6px;
box-shadow:0 15px 30px rgba(0,0,0,.6);
animation:flutuar 6s ease-in-out infinite;
}

.polaroid img{
width:100%;
border-radius:4px;
}

/* animação flutuar */
@keyframes flutuar{
0%{transform:translateY(0) rotate(-4deg)}
50%{transform:translateY(-12px) rotate(4deg)}
100%{transform:translateY(0) rotate(-4deg)}
}

/* corações */
.coracao{
position:fixed;
color:#ff4d6d;
pointer-events:none;
animation:cair 6s linear infinite;
z-index:1;
}

@keyframes cair{
0%{transform:translateY(-10vh);opacity:1}
100%{transform:translateY(110vh);opacity:0}
}

/* botão eu te amo */
#botaoAmor{
display:none;
margin-top:20px;
font-size:16px;
background:#ffffff22;
backdrop-filter:blur(5px);
border:1px solid #ffffff33;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<h1>7 anos de nós ❤️</h1>

<div id="contador"></div>

<div id="texto"></div>

<button onclick="iniciar()">Começar nossa história</button>

<div class="galeria" id="galeria">

<div class="polaroid"><img src="foto1.jpg"></div>
<div class="polaroid"><img src="foto2.jpg"></div>
<div class="polaroid"><img src="foto3.jpg"></div>

</div>

<button id="botaoAmor" onclick="explodirAmor()">eu te amo ❤️</button>

</div>

<audio id="musica" loop>
<source src="audio.mp3" type="audio/mpeg">
</audio>

<script>

/* --------- CÉU ESTRELADO --------- */

const canvas = document.getElementById("stars")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let estrelas = []

for(let i=0;i<120;i++){
estrelas.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5
})
}

function desenharEstrelas(){
ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

estrelas.forEach(e=>{
ctx.beginPath()
ctx.arc(e.x,e.y,e.r,0,Math.PI*2)
ctx.fill()
})

requestAnimationFrame(desenharEstrelas)
}

desenharEstrelas()


/* --------- CONTADOR --------- */

const inicio = new Date("2019-03-16")

function atualizarContador(){

const agora = new Date()

let anos = agora.getFullYear() - inicio.getFullYear()
let meses = agora.getMonth() - inicio.getMonth()
let dias = agora.getDate() - inicio.getDate()

if(dias < 0){meses--;dias += 30}
if(meses < 0){anos--;meses += 12}

document.getElementById("contador").innerHTML =
"Estamos juntos há <b>"+anos+" anos, "+meses+" meses e "+dias+" dias</b>"

}

setInterval(atualizarContador,1000)
atualizarContador()


/* --------- TEXTO --------- */

const texto = `
Sete anos parecem apenas um número…

até lembrar de tudo que cabe dentro dele.

Momentos simples viraram memórias.
Conversas viraram planos.
E planos viraram nossa história.

Entre risadas, desafios e sonhos,
construímos algo raro.

Algo verdadeiro.

Feliz 7 anos de nós ❤️
`

let i = 0

function escrever(){

if(i < texto.length){

document.getElementById("texto").innerHTML += texto.charAt(i)
i++
setTimeout(escrever,35)

}else{

document.getElementById("galeria").style.display="block"
document.getElementById("botaoAmor").style.display="inline-block"

}

}


/* --------- INICIAR --------- */

function iniciar(){

document.querySelector("button").style.display="none"

document.getElementById("musica").play()

escrever()

}


/* --------- CORAÇÕES CAINDO --------- */

function coracoes(){

const coracao = document.createElement("div")

coracao.classList.add("coracao")

coracao.innerHTML = "❤"

coracao.style.left = Math.random()*100+"vw"
coracao.style.fontSize = Math.random()*22+12+"px"

document.body.appendChild(coracao)

setTimeout(()=>{
coracao.remove()
},6000)

}

setInterval(coracoes,350)


/* --------- EXPLOSÃO DE AMOR --------- */

function explodirAmor(){

for(let i=0;i<40;i++){

const c = document.createElement("div")

c.classList.add("coracao")

c.innerHTML="❤"

c.style.left="50vw"
c.style.top="50vh"
c.style.fontSize=Math.random()*30+20+"px"

document.body.appendChild(c)

setTimeout(()=>{
c.remove()
},2000)

}

}

</script>

</body>
</html>

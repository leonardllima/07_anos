
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 anos de nós</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
color:white;
text-align:center;
overflow:hidden;

background: linear-gradient(-45deg,#0f0f0f,#1c1c2e,#3a0f2b,#111);
background-size:400% 400%;
animation:fundo 12s ease infinite;
}

@keyframes fundo{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
padding:30px 20px;
max-width:500px;
margin:auto;
}

h1{
font-size:34px;
margin-bottom:10px;
}

#contador{
font-size:16px;
margin-bottom:25px;
opacity:.9;
}

#texto{
font-size:18px;
line-height:1.6;
min-height:160px;
margin-bottom:30px;
}

button{
background:#ff4d6d;
color:white;
border:none;
padding:16px 30px;
font-size:18px;
border-radius:30px;
cursor:pointer;
width:80%;
max-width:280px;
}

.galeria{
display:none;
margin-top:20px;
}

.foto{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
margin:10px;
border:3px solid #ff4d6d;
box-shadow:0 8px 20px rgba(0,0,0,.6);
animation:flutuar 4s ease-in-out infinite;
}

@keyframes flutuar{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

.coracao{
position:fixed;
color:#ff4d6d;
animation:cair 6s linear infinite;
}

@keyframes cair{
0%{transform:translateY(-10vh);opacity:1}
100%{transform:translateY(110vh);opacity:0}
}

</style>
</head>

<body>

<div class="container">

<h1>7 anos de nós ❤️</h1>

<div id="contador"></div>

<div id="texto"></div>

<button onclick="iniciar()">Tocar nossa história</button>

<div class="galeria" id="galeria">

<img src="foto1.jpg" class="foto">
<img src="foto2.jpg" class="foto">
<img src="foto3.jpg" class="foto">

</div>

</div>

<audio id="musica" loop>
<source src="audio.mp3" type="audio/mpeg">
</audio>

<script>

const inicio = new Date("2019-03-16")

function atualizarContador(){

const agora = new Date()

let anos = agora.getFullYear() - inicio.getFullYear()
let meses = agora.getMonth() - inicio.getMonth()
let dias = agora.getDate() - inicio.getDate()

if(dias < 0){meses--;dias += 30}
if(meses < 0){anos--;meses += 12}

document.getElementById("contador").innerHTML =
"Estamos juntos há <b>"+anos+" anos, "+meses+" meses e "+dias+" dias</b> ❤️"

}

setInterval(atualizarContador,1000)
atualizarContador()

const texto = `
Sete anos parecem apenas um número…

até lembrar de tudo que cabe dentro dele.

Momentos simples viraram memórias.
Conversas viraram planos.
E planos viraram nossa história.

Entre risadas, desafios e sonhos,
fomos construindo algo raro.

Algo verdadeiro.

Feliz 7 anos de nós ❤️
`

let i = 0

function escrever(){

if(i < texto.length){

document.getElementById("texto").innerHTML += texto.charAt(i)

i++

setTimeout(escrever,35)

}else{

document.getElementById("galeria").style.display="block"

}

}

function iniciar(){

document.querySelector("button").style.display="none"

document.getElementById("musica").play()

escrever()

}

function coracoes(){

const coracao = document.createElement("div")

coracao.classList.add("coracao")

coracao.innerHTML = "❤"

coracao.style.left = Math.random()*100+"vw"

coracao.style.fontSize = Math.random()*18+12+"px"

document.body.appendChild(coracao)

setTimeout(()=>{

coracao.remove()

},6000)

}

setInterval(coracoes,350)

</script>

</body>
</html>

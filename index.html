<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 anos de nós</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background: radial-gradient(circle at top,#0b0b25,#02020a 80%);
overflow-x:hidden;
}

.container{
position:relative;
z-index:5;
padding:30px 20px;
max-width:600px;
margin:auto;
}

h1{font-size:36px;margin-bottom:10px;}

button{
background:#ff4d6d;
border:none;
color:white;
padding:14px 26px;
font-size:18px;
border-radius:40px;
cursor:pointer;
margin:10px;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

#jogoAmor{
margin-top:50px;
}

.areaJogo{
position:relative;
height:180px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
}

/* AVATARES CIRCULARES */

.avatar{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
box-shadow:0 10px 20px rgba(0,0,0,.4);
}

/* CORAÇÃO ANIMADO */

#coracao{
position:absolute;
left:120px;
top:60px;
font-size:32px;
opacity:0;
transition:all 1s ease;
}

#resultado{
margin-top:20px;
font-size:20px;
color:#ff4d6d;
}

</style>
</head>

<body>

<div class="container">

<h1>7 anos de nós ❤️</h1>

<div id="jogoAmor">

<h2>Um joguinho pra nós ❤️</h2>

<div class="areaJogo">

<img src="foto4.jpg" class="avatar" id="rapaz">

<div id="coracao">❤️</div>

<img src="foto5.jpg" class="avatar" id="moca">

</div>

<button onclick="lancarCoracao()">Jogar coração ❤️</button>

<div id="resultado"></div>

</div>

</div>

<script>

function lancarCoracao(){

const coracao=document.getElementById("coracao")
const resultado=document.getElementById("resultado")

coracao.style.opacity="1"
coracao.style.left="70%"

setTimeout(()=>{

resultado.innerHTML="💖 Ela recebeu seu coração!"

coracao.style.opacity="0"
coracao.style.left="120px"

},1000)

}

</script>

</body>
</html>


<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 anos de nós</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
color:white;
text-align:center;
background:#03030a;
overflow-x:hidden;
}

/* GALÁXIA */
#galaxy{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* CONTAINER */
.container{
position:relative;
z-index:2;
padding:30px 20px;
max-width:520px;
margin:auto;
}

h1{
font-size:34px;
margin-bottom:8px;
letter-spacing:1px;
}

#contador{
font-size:16px;
opacity:.9;
margin-bottom:20px;
}

#texto{
font-size:18px;
line-height:1.6;
min-height:150px;
margin-bottom:25px;
}

/* BOTÕES */
button{
background:linear-gradient(45deg,#ff4d6d,#ff758f);
border:none;
color:white;
padding:16px 30px;
font-size:18px;
border-radius:40px;
cursor:pointer;
box-shadow:0 12px 25px rgba(0,0,0,.5);
width:85%;
max-width:280px;
margin:10px;
}

/* GALERIA */
.galeria{
display:none;
margin-top:20px;
}

.polaroid{
background:white;
padding:8px;
width:120px;
display:inline-block;
margin:10px;
border-radius:6px;
box-shadow:0 15px 30px rgba(0,0,0,.6);
animation:flutuar 6s ease-in-out infinite;
}

.polaroid img{
width:100%;
border-radius:4px;
}

@keyframes flutuar{
0%{transform:translateY(0) rotate(-4deg)}
50%{transform:translateY(-12px) rotate(4deg)}
100%{transform:translateY(0) rotate(-4deg)}
}

/* CORAÇÕES CAINDO */
.coracao{
position:fixed;
color:#ff4d6d;
font-size:20px;
animation:cair 6s linear infinite;
pointer-events:none;
z-index:5;
}

@keyframes cair{
0%{transform:translateY(-10vh);opacity:1}
100%{transform:translateY(110vh);opacity:0}
}

/* SURPRESA FINAL */
#surpresa{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000dd;
z-index:10;
align-items:center;
justify-content:center;
flex-direction:column;
padding:20px;
}

#surpresa h2{
font-size:28px;
margin-bottom:20px;
}

</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<div class="container">

<h1>7 anos de nós ❤️</h1>

<div id="contador"></div>

<div id="texto"></div>

<button id="botaoStart" onclick="iniciar()">Começar nossa história</button>

<div class="galeria" id="galeria">

<div class="polaroid"><img src="foto1.jpg"></div>
<div class="polaroid"><img src="foto2.jpg"></div>
<div class="polaroid"><img src="foto3.jpg"></div>

</div>

<button id="botaoAmor" style="display:none" onclick="explodirAmor()">Eu te amo ❤️</button>

<button id="botaoSurpresa" style="display:none" onclick="abrirSurpresa()">Uma última coisa...</button>

</div>

<div id="surpresa">
<h2>Obrigado por cada momento ❤️</h2>
<p>Que a nossa história continue por muitos e muitos anos.</p>
<button onclick="fecharSurpresa()">Fechar</button>
</div>

<audio id="musica" loop>
<source src="audio.mp3" type="audio/mpeg">
</audio>

<script>

/* GALÁXIA */

const canvas=document.getElementById("galaxy")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5
})
}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.fillStyle="white"

stars.forEach(s=>{
ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()
})

requestAnimationFrame(drawStars)
}

drawStars()


/* CONTADOR */

const inicio = new Date("2019-03-17")

function atualizarContador(){

const agora = new Date()

let anos = agora.getFullYear() - inicio.getFullYear()
let meses = agora.getMonth() - inicio.getMonth()
let dias = agora.getDate() - inicio.getDate()

if(dias < 0){meses--;dias += 30}
if(meses < 0){anos--;meses += 12}

document.getElementById("contador").innerHTML =
"Desde 17/03/2019 estamos juntos há <b>"+anos+" anos, "+meses+" meses e "+dias+" dias</b>"

}

setInterval(atualizarContador,1000)
atualizarContador()


/* TEXTO */

const texto=`
Sete anos parecem apenas um número…

até lembrar de tudo que cabe dentro dele.

Momentos simples viraram memórias.
Conversas viraram planos.
E planos viraram nossa história.

Entre risadas, desafios e sonhos,
construímos algo raro.

Algo verdadeiro.

Feliz 7 anos de nós ❤️
`

let i=0

function escrever(){

if(i < texto.length){

document.getElementById("texto").innerHTML += texto.charAt(i)
i++
setTimeout(escrever,35)

}else{

document.getElementById("galeria").style.display="block"
document.getElementById("botaoAmor").style.display="inline-block"
document.getElementById("botaoSurpresa").style.display="inline-block"

}

}


/* INICIAR */

function iniciar(){

document.getElementById("botaoStart").style.display="none"

document.getElementById("musica").play()

escrever()

}


/* CORAÇÕES CAINDO DESDE O INÍCIO */

function coracoes(){

const c=document.createElement("div")

c.classList.add("coracao")
c.innerHTML="❤"

c.style.left=Math.random()*100+"vw"
c.style.fontSize=Math.random()*25+15+"px"

document.body.appendChild(c)

setTimeout(()=>{c.remove()},6000)

}

setInterval(coracoes,350)


/* EXPLOSÃO DE CORAÇÕES */

function explodirAmor(){

for(let i=0;i<60;i++){

const c=document.createElement("div")

c.innerHTML="❤"
c.style.position="fixed"
c.style.left="50%"
c.style.top="50%"
c.style.fontSize=Math.random()*40+20+"px"
c.style.transform="translate(-50%,-50%)"
c.style.color="#ff4d6d"
c.style.zIndex=6

document.body.appendChild(c)

let angle=Math.random()*Math.PI*2
let distance=Math.random()*300

c.animate([
{transform:"translate(-50%,-50%)"},
{transform:`translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)`}
],{
duration:1000,
easing:"ease-out"
})

setTimeout(()=>c.remove(),1000)

}

}


/* SURPRESA FINAL */

function abrirSurpresa(){
document.getElementById("surpresa").style.display="flex"
}

function fecharSurpresa(){
document.getElementById("surpresa").style.display="none"
}

</script>

</body>
</html>

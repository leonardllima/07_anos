
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>7 anos de nós</title>
<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
overflow:hidden;
background: linear-gradient(-45deg,#0f0f0f,#1c1c2e,#3a0f2b,#111);
background-size:400% 400%;
animation:fundo 12s ease infinite;
}
@keyframes fundo{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
.container{
max-width:900px;
margin:auto;
padding:40px 20px;
position:relative;
z-index:2;
}
h1{font-size:48px;margin-bottom:10px;}
#contador{font-size:20px;margin-bottom:30px;opacity:.9;}
#texto{font-size:22px;line-height:1.6;min-height:200px;margin-bottom:40px;}
button{
background:#ff4d6d;color:white;border:none;padding:18px 40px;font-size:20px;
border-radius:30px;cursor:pointer;transition:.3s;
}
button:hover{transform:scale(1.1);}
.galeria{display:none;margin-top:30px;}
.foto{
width:140px;height:140px;border-radius:50%;object-fit:cover;margin:15px;
border:4px solid #ff4d6d;box-shadow:0 10px 30px rgba(0,0,0,.6);
animation:flutuar 4s ease-in-out infinite;
}
@keyframes flutuar{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}
.coracao{position:fixed;color:#ff4d6d;animation:cair 6s linear infinite;}
@keyframes cair{
0%{transform:translateY(-10vh);opacity:1}
100%{transform:translateY(110vh);opacity:0}
}
.fotoFlutuante{
position:fixed;width:60px;height:60px;border-radius:50%;object-fit:cover;
animation:cair 8s linear infinite;opacity:.8;
}
</style>
</head>
<body>
<div class="container">
<h1>7 anos de nós ❤️</h1>
<div id="contador"></div>
<div id="texto"></div>
<button onclick="iniciar()">Começar</button>
<div class="galeria" id="galeria">
<img src="foto1.jpg" class="foto">
<img src="foto2.jpg" class="foto">
<img src="foto3.jpg" class="foto">
</div>
</div>
<audio id="musica" loop>
<source src="audio.mp3" type="audio/mpeg">
</audio>
<script>
const inicio = new Date("2019-03-16")
function atualizarContador(){
const agora = new Date()
let anos = agora.getFullYear() - inicio.getFullYear()
let meses = agora.getMonth() - inicio.getMonth()
let dias = agora.getDate() - inicio.getDate()
if(dias < 0){meses--;dias += 30}
if(meses < 0){anos--;meses += 12}
document.getElementById("contador").innerHTML =
"Vivendo essa história há <b>"+anos+" anos, "+meses+" meses e "+dias+" dias</b> ❤️"
}
setInterval(atualizarContador,1000)
atualizarContador()
const texto = `
Sete anos parecem apenas um número…
até lembrar de tudo que cabe dentro dele.
Momentos simples viraram memória.
Conversas viraram planos.
E planos viraram história.
Entre risadas, desafios e sonhos,
construímos algo raro.
Algo verdadeiro.
Feliz 7 anos de nós ❤️
`
let i = 0
function escrever(){
if(i < texto.length){
document.getElementById("texto").innerHTML += texto.charAt(i)
i++
setTimeout(escrever,40)
}else{
document.getElementById("galeria").style.display="block"
}
}
function iniciar(){
document.querySelector("button").style.display="none"
document.getElementById("musica").play()
escrever()
}
function coracoes(){
const coracao = document.createElement("div")
coracao.classList.add("coracao")
coracao.innerHTML = "❤"
coracao.style.left = Math.random()*100+"vw"
coracao.style.fontSize = Math.random()*20+10+"px"
document.body.appendChild(coracao)
setTimeout(()=>{coracao.remove()},6000)
}
setInterval(coracoes,300)
function fotosFlutuando(){
const fotos = ["foto1.jpg","foto2.jpg","foto3.jpg"]
const img = document.createElement("img")
img.src = fotos[Math.floor(Math.random()*fotos.length)]
img.classList.add("fotoFlutuante")
img.style.left = Math.random()*100+"vw"
document.body.appendChild(img)
setTimeout(()=>{img.remove()},8000)
}
setInterval(fotosFlutuando,2000)
</script>
</body>
</html>

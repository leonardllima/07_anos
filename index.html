
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 anos de nós</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
color:white;
text-align:center;
background: radial-gradient(circle at top,#0b0b25,#02020a 80%);
overflow-x:hidden;
}

.star{
position:fixed;
width:2px;
height:2px;
background:white;
opacity:.8;
}

.container{
position:relative;
z-index:5;
padding:30px 20px;
max-width:520px;
margin:auto;
}

h1{font-size:36px;margin-bottom:10px;}
#contador{font-size:18px;margin-bottom:25px;}
#texto{font-size:18px;line-height:1.6;min-height:140px;margin-bottom:25px;white-space:pre-line;}

button{
background:#ff4d6d;
border:none;
color:white;
padding:16px 28px;
font-size:18px;
border-radius:40px;
cursor:pointer;
margin:10px;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.secondary{
background:#ffffff22;
border:1px solid #ffffff33;
}

#polaroidArea{margin-top:30px;}

.polaroid{
background:white;
padding:8px;
width:130px;
display:inline-block;
margin:10px;
border-radius:6px;
box-shadow:0 15px 30px rgba(0,0,0,.6);
transform:rotate(-3deg);
opacity:0;
animation:fadeIn 1s forwards;
}

.polaroid img{width:100%;border-radius:4px;}

@keyframes fadeIn{to{opacity:1}}

.spacePhoto{
position:fixed;
top:-150px;
width:110px;
z-index:2;
animation:fallPhoto 3.5s cubic-bezier(.22,.61,.36,1) forwards;
}

@keyframes fallPhoto{
0%{transform:translateY(-150px) scale(.3) rotate(0)}
80%{transform:translateY(50vh) scale(1.1) rotate(320deg)}
100%{transform:translateY(55vh) scale(1) rotate(360deg)}
}

.heart{
position:fixed;
top:-10vh;
font-size:22px;
color:#ff2e63;
animation:fall 6s linear infinite;
z-index:20;
pointer-events:none;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* modal surpresa */
#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000dd;
z-index:50;
align-items:center;
justify-content:center;
flex-direction:column;
padding:30px;
}

#modal h2{
margin-bottom:20px;
}

#modal button{
background:#ff4d6d;
}

</style>
</head>

<body>

<div class="container">

<h1>7 anos de nós ❤️</h1>

<div id="contador"></div>

<div id="texto"></div>

<button id="startBtn" onclick="start()">Começar nossa história</button>

<div id="polaroidArea"></div>

<button id="loveBtn" style="display:none" onclick="explode()">Eu te amo ❤️</button>

<button id="extraBtn" style="display:none" class="secondary" onclick="openModal()">Uma última coisa...</button>

<a href="https://wa.me/5563984167994" target="_blank">
<button id="whatsBtn" style="display:none" class="secondary">Se der saudade...</button>
</a>

</div>

<div id="modal">
<h2>Se chegou até aqui…</h2>
<p>É porque nossa história continua sendo escrita todos os dias.</p>
<p>E eu escolheria você de novo em cada um deles. ❤️</p>
<button onclick="closeModal()">Fechar</button>
</div>

<audio id="music" loop>
<source src="audio.mp3" type="audio/mpeg">
</audio>

<script>

/* estrelas */
for(let i=0;i<120;i++){
let s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
document.body.appendChild(s)
}

/* contador */
const startDate=new Date("2019-03-17")

function updateCounter(){
const now=new Date()

let y=now.getFullYear()-startDate.getFullYear()
let m=now.getMonth()-startDate.getMonth()
let d=now.getDate()-startDate.getDate()

if(d<0){m--;d+=30}
if(m<0){y--;m+=12}

document.getElementById("contador").innerHTML =
"<b>"+y+" anos, "+m+" meses e "+d+" dias juntos</b>"
}

setInterval(updateCounter,1000)
updateCounter()

/* texto */

const text=`
Sete anos podem parecer apenas um número.
Mas quando olho para trás, vejo quantas histórias cabem dentro dele.

Momentos simples viraram lembranças inesquecíveis.
Conversas viraram planos.
E, sem perceber, os planos viraram a nossa história.

Entre risadas, desafios, conquistas e sonhos compartilhados, fomos construindo algo raro:
um amor leve, verdadeiro e cheio de propósito.

Feliz 7 anos de nós. ❤️
`

let i=0

function type(){
if(i<text.length){
document.getElementById("texto").innerHTML+=text.charAt(i)
i++
setTimeout(type,35)
}else{
document.getElementById("loveBtn").style.display="inline-block"
document.getElementById("extraBtn").style.display="inline-block"
document.getElementById("whatsBtn").style.display="inline-block"
}
}

function start(){
document.getElementById("startBtn").style.display="none"
document.getElementById("music").play()
type()
launchPhotos()
}

/* corações */

function hearts(){
let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤"
h.style.left=Math.random()*100+"vw"
document.body.appendChild(h)
setTimeout(()=>h.remove(),6000)
}

setInterval(hearts,400)

/* fotos caem apenas uma vez */

const photos=["foto1.jpg","foto2.jpg","foto3.jpg"]

function launchPhotos(){

photos.forEach((src,index)=>{

setTimeout(()=>{

let img=document.createElement("img")
img.src=src
img.className="spacePhoto"
img.style.left=(20+index*30)+"vw"

document.body.appendChild(img)

setTimeout(()=>{

img.remove()

let pol=document.createElement("div")
pol.className="polaroid"

let pimg=document.createElement("img")
pimg.src=src

pol.appendChild(pimg)

document.getElementById("polaroidArea").appendChild(pol)

},3500)

},index*1800)

})

}

/* explosão */

function explode(){

for(let i=0;i<40;i++){

let h=document.createElement("div")

h.innerHTML="❤"
h.style.position="fixed"
h.style.left="50%"
h.style.top="50%"
h.style.fontSize="30px"
h.style.color="#ff2e63"
h.style.zIndex=30

document.body.appendChild(h)

let a=Math.random()*Math.PI*2
let d=Math.random()*300

h.animate([
{transform:"translate(-50%,-50%)"},
{transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`}
],{duration:900})

setTimeout(()=>h.remove(),900)

}

}

/* modal */

function openModal(){
document.getElementById("modal").style.display="flex"
}

function closeModal(){
document.getElementById("modal").style.display="none"
}

</script>
</body>
</html>
